name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev

      - name: Package boundary check
        run: npm run package:check

      - name: Package dry run
        run: npm pack --dry-run

  release-gates:
    name: Release gates on Node.js 22.x
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package files
        run: npm run build

      - name: Daemon-ready installed-package gate
        run: npm run daemon:verify

      - name: Runtime safety installed-package gate
        run: npm run runtime:safety

      - name: Dogfood without authenticated real runs
        run: npm run dogfood
